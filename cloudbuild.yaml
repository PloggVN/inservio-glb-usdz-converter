steps:
  # 1. Install dependencies
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  # 2. Build the project
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  # 3. (Optional) Deploy step could go here
  # To store build artifacts, create a Google Cloud Storage bucket 
  # and add an 'artifacts' section here.

options:
  logging: CLOUD_LOGGING_ONLY
