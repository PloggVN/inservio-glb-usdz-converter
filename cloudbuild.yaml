steps:
  # 1. Install dependencies
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  # 2. Build the project
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  # 3. (Optional) Deploy step could go here
  # Example: Deploy to Firebase or Cloud Storage

artifacts:
  objects:
    location: 'gs://your-bucket-name/build-output/' # Replace with your bucket
    paths: ['dist/*']

options:
  logging: CLOUD_LOGGING_ONLY
